<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>PanaTurno</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}
      body{overflow-x:hidden;background:#f8fafc;}

      /* ── PRELOADER ── */
      #preloader{
        position:fixed;inset:0;z-index:99999;
        background:#fff;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:18px;
        transition:opacity .5s ease, visibility .5s ease;
      }
      #preloader.hidden{opacity:0;visibility:hidden;pointer-events:none;}

      #preloader svg{ width:180px; }

      #preloader p{
        font-family:system-ui,sans-serif;
        font-size:13px;font-weight:700;
        color:#64748b;letter-spacing:1.5px;
        text-transform:uppercase;
        animation:pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

      /* barra de carga */
      .bar-wrap{
        width:140px;height:3px;
        background:#e2e8f0;border-radius:99px;overflow:hidden;
      }
      .bar-fill{
        height:100%;border-radius:99px;
        background:linear-gradient(90deg,#6366f1,#8b5cf6);
        animation:load 1.8s ease-in-out infinite;
      }
      @keyframes load{
        0%{width:0%;margin-left:0}
        50%{width:70%;margin-left:15%}
        100%{width:0%;margin-left:100%}
      }

      /* ojo parpadeo */
      #ojo{
        transform-box:fill-box;transform-origin:center;
        animation:ojoReducir 3s infinite;
      }
      @keyframes ojoReducir{
        0%{transform:scaleY(1)}
        40%{transform:scaleY(1)}
        50%{transform:scaleY(0.2)}
        60%{transform:scaleY(1)}
        100%{transform:scaleY(1)}
      }
      #ceja1,#ceja2{
        transform-box:fill-box;transform-origin:center;
        animation:brow 4s infinite;
      }
      @keyframes brow{
        0%,100%{transform:translateY(0px)}
        50%{transform:translateY(-6px)}
      }
    </style>
  </head>
